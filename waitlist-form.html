<!DOCTYPE html>
<html>
  <body>
    <!-- Static form skeleton so Netlify registers the form at build time. -->
    <!-- This file is never shown to users. -->
    <form name="waitlist" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="email" name="email" />
    </form>
  </body>
</html>
